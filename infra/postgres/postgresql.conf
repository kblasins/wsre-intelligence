# PostgreSQL 17 tuning — Hetzner CPX31/CCX23 profile
# 8GB RAM, 4 vCPU (shared or dedicated depending on host)
# Workload: OLAP-leaning (dashboard queries, aggregations) with light OLTP writes

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 2GB                 # ~25% of RAM; Postgres I/O cache
effective_cache_size = 6GB           # estimate of total OS + Postgres cache
work_mem = 64MB                      # per sort/hash; ~4 concurrent sorts × 16 connections
maintenance_work_mem = 512MB         # for VACUUM, CREATE INDEX, ANALYZE

# ── WAL / Reliability ────────────────────────────────────────────────────────
wal_level = replica                  # required for pgBackRest streaming archive
max_wal_senders = 3
wal_compression = on
archive_mode = on
archive_command = '/bin/true'        # overridden by pgBackRest in production

# Checkpoint tuning — reduce checkpoint frequency to reduce I/O spikes
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# ── Query planner ─────────────────────────────────────────────────────────────
random_page_cost = 1.1               # NVMe SSD — close to sequential cost
effective_io_concurrency = 200       # NVMe supports high concurrency
default_statistics_target = 100

# ── Parallelism ───────────────────────────────────────────────────────────────
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 100                # FastAPI uses connection pool (max 20 + overflow 20)
                                     # Alembic + scheduler get the rest

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement = 500     # log queries >500ms to stdout
log_checkpoints = on
log_lock_waits = on
log_temp_files = 10MB

# ── Extensions pre-loaded ─────────────────────────────────────────────────────
# pg_trgm and btree_gin are enabled in the initial Alembic migration
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
