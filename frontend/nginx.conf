server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback — all routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Docker / Caddy upstreams
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cache hashed assets aggressively (Vite adds content hashes)
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
